<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>움직이는 버디</title>
<script type="module" src="assets/model-viewer.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(circle at 50% 30%, #0b2a4a 0%, #04121f 70%, #020a12 100%);
    font-family: "Pretendard", system-ui, -apple-system, sans-serif;
    color: #eaf4ff;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    padding: 18px 24px 8px;
    text-align: center;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: .04em; }
  header p { font-size: 13px; opacity: .6; margin-top: 4px; }

  model-viewer {
    flex: 1;
    width: 100%;
    background: transparent;
    --poster-color: transparent;
  }

  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
    flex-wrap: wrap;
  }
  .controls button {
    background: rgba(80, 170, 255, .14);
    border: 1px solid rgba(120, 190, 255, .35);
    color: #dff0ff;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 14px;
    cursor: pointer;
    transition: .18s;
    backdrop-filter: blur(6px);
  }
  .controls button:hover { background: rgba(80, 170, 255, .28); }
  .controls button.active { background: rgba(80, 170, 255, .4); border-color: #7ec8ff; }

  #anim-select {
    background: rgba(10,30,50,.7);
    color: #dff0ff;
    border: 1px solid rgba(120,190,255,.35);
    border-radius: 999px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
  }
</style>

<header>
  <h1>움직이는 버디 🐠</h1>
  <p>드래그 회전 · 스크롤 확대 · 애니메이션 재생</p>
</header>

<model-viewer
  id="mv"
  src="assets/moving-buddy.glb"
  alt="움직이는 버디 3D 모델"
  camera-controls
  auto-rotate
  autoplay
  animation-name=""
  shadow-intensity="1"
  exposure="1.1"
  environment-image="neutral"
  camera-orbit="45deg 75deg auto"
  interaction-prompt="none">
</model-viewer>

<div class="controls">
  <button id="btn-play" class="active">⏸ 정지</button>
  <button id="btn-rotate" class="active">🔄 자동회전</button>
  <select id="anim-select" style="display:none"></select>
</div>

<script type="module">
  const mv = document.getElementById('mv');
  const btnPlay = document.getElementById('btn-play');
  const btnRotate = document.getElementById('btn-rotate');
  const sel = document.getElementById('anim-select');

  mv.addEventListener('load', () => {
    const anims = mv.availableAnimations || [];
    // 내장 애니메이션이 없으면 재생/정지 버튼은 숨기고 자동회전으로만 움직임 표현
    if (anims.length === 0) btnPlay.style.display = 'none';
    if (anims.length > 1) {
      sel.style.display = '';
      anims.forEach((name, i) => {
        const o = document.createElement('option');
        o.value = name; o.textContent = name || `애니 ${i+1}`;
        sel.appendChild(o);
      });
      sel.addEventListener('change', () => {
        mv.animationName = sel.value;
        mv.play();
        setPlay(true);
      });
    }
  });

  let playing = true;
  function setPlay(p) {
    playing = p;
    btnPlay.textContent = p ? '⏸ 정지' : '▶ 재생';
    btnPlay.classList.toggle('active', p);
  }
  btnPlay.addEventListener('click', () => {
    if (playing) { mv.pause(); setPlay(false); }
    else { mv.play(); setPlay(true); }
  });

  btnRotate.addEventListener('click', () => {
    const on = mv.hasAttribute('auto-rotate');
    if (on) mv.removeAttribute('auto-rotate');
    else mv.setAttribute('auto-rotate', '');
    btnRotate.classList.toggle('active', !on);
  });
</script>
